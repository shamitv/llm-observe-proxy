{% macro confirm_modal(id, title, message, confirm_text="Delete", danger=true) %}
<div class="modal-overlay" id="{{ id }}" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="{{ id }}-title">
    <h3 id="{{ id }}-title">{{ title }}</h3>
    <p>{{ message }}</p>
    <div class="modal-actions">
      <button class="button ghost" type="button" data-dismiss-modal>Cancel</button>
      <button class="button {{ 'danger' if danger else 'primary' }}" type="button" data-confirm-modal>{{ confirm_text }}</button>
    </div>
  </div>
</div>
{% endmacro %}
