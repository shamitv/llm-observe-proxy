{% extends "base.html" %}
{% block content %}
<section
  data-live-page="runs"
  data-api-url="/admin/api/runs"
  data-poll-interval="1000"
>
  <section class="page-heading">
    <div>
      <p class="eyebrow">Task benchmarking</p>
      <h1>Runs</h1>
    </div>
    <div class="stats" data-live-run-stats>
      <span><strong>-</strong>Shown</span>
      <span><strong>-</strong>Active</span>
    </div>
  </section>

  <div class="live-status" data-live-status aria-live="polite">Loading runs...</div>

  {% if error %}
  <div class="alert">{{ error }}</div>
  {% endif %}

  <section class="run-control" data-live-run-control data-run-notes="true">
    <div>
      <p class="eyebrow">Run status</p>
      <h2>Loading</h2>
      <p class="muted">Checking active run...</p>
    </div>
  </section>

  <section class="table-shell" data-live-runs-table>
    <div class="empty-state">Loading runs...</div>
  </section>
</section>
{% endblock %}
